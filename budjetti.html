<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>index</title>
<style>
  :root {
    --bg: #faf7f2;
    --ink: #2b2b2b;
    --line: #e0dcd4;
    --green: #2e7d32;
    --red: #c0392b;
    --accent: #8a6d3b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding: 16px;
    max-width: 480px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.4rem;
    margin: 12px 0 4px;
    letter-spacing: 0.02em;
  }
  .balance {
    font-size: 2.4rem;
    font-weight: 700;
    margin: 8px 0 16px;
  }
  .balance.negative { color: var(--red); }
  .balance.positive { color: var(--green); }

  form {
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: white;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 16px;
  }
  .row { display: flex; gap: 8px; }
  input, select {
    flex: 1;
    padding: 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    font-size: 1rem;
    background: #fff;
  }
  button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: white;
    font-size: 1rem;
    font-weight: 600;
  }
  ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 4px;
    border-bottom: 1px solid var(--line);
  }
  li:last-child { border-bottom: none; }
  .desc { flex: 1; }
  .amount.income { color: var(--green); font-weight: 600; }
  .amount.expense { color: var(--red); font-weight: 600; }
  .del {
    background: none;
    border: none;
    color: #aaa;
    font-size: 1.2rem;
    padding: 0 0 0 10px;
  }
  .empty {
    text-align: center;
    color: #999;
    padding: 20px 0;
  }
</style>
</head>
<body>

<h1>Budjetti</h1>
<div class="balance" id="balance">0,00 €</div>

<form id="form">
  <div class="row">
    <input type="text" id="desc" placeholder="Kuvaus (esim. Ruoka)" required>
  </div>
  <div class="row">
    <input type="number" id="amount" placeholder="Summa €" step="0.01" required>
    <select id="type">
      <option value="expense">Meno</option>
      <option value="income">Tulo</option>
    </select>
  </div>
  <button type="submit">Lisää</button>
</form>

<ul id="list"></ul>
<div class="empty" id="empty" style="display:none;">Ei merkintöjä vielä.</div>

<script>
  let entries = [];

  const form = document.getElementById('form');
  const list = document.getElementById('list');
  const balanceEl = document.getElementById('balance');
  const emptyEl = document.getElementById('empty');

  function format(n) {
    return n.toFixed(2).replace('.', ',') + ' €';
  }

  function render() {
    list.innerHTML = '';
    let total = 0;

    entries.forEach((e, i) => {
      total += e.type === 'income' ? e.amount : -e.amount;

      const li = document.createElement('li');
      li.innerHTML = `
        <span class="desc">${e.desc}</span>
        <span class="amount ${e.type}">${e.type === 'income' ? '+' : '-'}${format(e.amount)}</span>
        <button class="del" data-i="${i}">×</button>
      `;
      list.appendChild(li);
    });

    emptyEl.style.display = entries.length === 0 ? 'block' : 'none';
    balanceEl.textContent = format(total);
    balanceEl.className = 'balance ' + (total < 0 ? 'negative' : 'positive');
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const desc = document.getElementById('desc').value.trim();
    const amount = parseFloat(document.getElementById('amount').value);
    const type = document.getElementById('type').value;

    if (!desc || isNaN(amount) || amount <= 0) return;

    entries.push({ desc, amount, type });
    form.reset();
    render();
  });

  list.addEventListener('click', (e) => {
    if (e.target.classList.contains('del')) {
      const i = parseInt(e.target.dataset.i);
      entries.splice(i, 1);
      render();
    }
  });

  render();
</script>

</body>
</html>
